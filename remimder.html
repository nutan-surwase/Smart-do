  <div id="contener">

<div id="inputs">
<div id="text">
<h1>Reminder Notifications</h1>
<p>Set reminders so you never forget important tasks.</p>
</div>
<br>
<input type="text" id="task" required  placeholder="enter the reminder">
<br>
<br>
<input type="date" id="date" required  placeholder="date"    >
<br><br>
<input type="time" id="time" required    placeholder="time" >
<br>
<br>
<button type="button" onclick="remind()"
> Set Reminder </button>
<ul id="riminders"></ul>


</div>


</div>

<script>

window.onload = function(){

let list = document.getElementById("riminders");

for(let i=0;i<localStorage.length;i++)
{

let value = localStorage.getItem(localStorage.key(i));

let li = document.createElement("li");


li.innerHTML = value + " <button onclick='deleteReminder(this)'>Delete</button>";


list.appendChild(li);

}

}

 
function remind()
{

let task=document.getElementById("task").value;

let date=document.getElementById("date").value;

let time=document.getElementById("time").value;


let reminderTime = new Date(date + " " + time).getTime();

let list = document.getElementById("riminders");

let li = document.createElement("li");


li.innerHTML = task +"-" + date +" "+ time + " <button onclick='deleteReminder(this)'>Delete</button>";



list.appendChild(li);
localStorage.setItem(task, task + " - " + date + " " + time);

alert("Reminder Added!");

checkReminder(reminderTime,task);


}


function checkReminder(reminderTime,task)
{

let timer = setInterval(function(){

let now = new Date().getTime();

if(now>=reminderTime)
{
alert("reminder: " + task);

clearInterval(timer);
}

},1000);

}

function deleteReminder(btn)
{
let li = btn.parentElement;
li.remove();
localStorage.clear();
}



</script>
